<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>

<body style="text-align:center; background-color:lightyellow;">

<h2>Simple Calculator</h2>

<!-- Enters numbers -->
<input type="text" id="n1" placeholder="Enter first number"><br><br>
<input type="text" id="n2" placeholder="Enter second number"><br><br>

<!-- Operation buttons -->
<button onclick="add()">Add</button>
<button onclick="sub()">Subtract</button>
<button onclick="mul()">Multiply</button>
<button onclick="div()">Divide</button>

<script>
function add() {
    let a = parseFloat(document.getElementById("n1").value);
    let b = parseFloat(document.getElementById("n2").value);
    alert("The sum is " + (a + b));
}

function sub() {
    let a = parseFloat(document.getElementById("n1").value);
    let b = parseFloat(document.getElementById("n2").value);
    alert("The difference is " + (a - b));
}

function mul() {
    let a = parseFloat(document.getElementById("n1").value);
    let b = parseFloat(document.getElementById("n2").value);
    alert("The product is " + (a * b));
}

function div() {
    let a = parseFloat(document.getElementById("n1").value);
    let b = parseFloat(document.getElementById("n2").value);

    if (b == 0) {
        alert("Cannot divide by zero");
    } else {
        alert("The result is " + (a / b));
    }
}
</script>

</body>
</html>
